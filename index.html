<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorveteria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
    <header>
        <div class="box-header">
            <h1>Gela Boca</h1>
            <h2>Bem Vindo(a)!</h2>

        </div>
        <div class="perfil">
            <span class="material-symbols-outlined">
                account_circle
            </span>
            <span class="material-symbols-outlined">
                shopping_bag
            </span>
        </div>
    </header>
    <main>
        <div class="box-milk">
            <div class="box-sabor">
                <img src="./images/milk-red.jpg" alt="Milk-Shake">
                
                    <h3>Beijo Doce</h3>
                    <button class="add-button">Adicionar <span class="material-symbols-outlined">
                            add_shopping_cart
                        </span></button>
          
            </div>
            <div class="box-sabor">
                <img src="./images/milk-azul.jpg" alt="Milk-Shake">
                
                    <h3>Céu Azul</h3>
                    <button class="add-button">Adicionar <span class="material-symbols-outlined">
                            add_shopping_cart
                        </span></button>
          
            </div>
            <div class="box-sabor">
                <img src="./images/milk-menta.jpg" alt="Milk-Shake">
                
                    <h3>Floresta Doce</h3>
                    <button class="add-button">Adicionar <span class="material-symbols-outlined">
                            add_shopping_cart
                        </span></button>
          
            </div>
            <div class="box-sabor">
                <img src="./images/milk-chocolate.jpg" alt="Milk-Shake">
                
                    <h3>Doce Cacau</h3>
                    <button class="add-button">Adicionar <span class="material-symbols-outlined">
                            add_shopping_cart
                        </span></button>
          
            </div>
        </div>
        <div class="box-sorvetes-casquinha">
            <div class="sabor-sorvete">
                <img src="./images/sorvete-chocolate.jpg" alt="Sorvete Casquinha">
            </div>
            <div class="sabor-sorvete">
                <img src="./images/sorvete-uva.jpg" alt="Sorvete Casquinha">
            </div>
            <div class="sabor-sorvete">
                <img src="./images/sorvete-morango.avif" alt="Sorvete Casquinha">
            </div>
            <div class="sabor-sorvete">
                <img src="./images/sorvete-maracuja.jpg" alt="Sorvete Casquinha">
            </div>

        </div>
        <div class="box-picole">
            <div class="sabor-picole">
                <img src="./images/picole-limao.jpg" alt="Picolé">
            </div>
            <div class="sabor-picole">
                <img src="./images/picole-maracuja.jpg" alt="Picolé">
            </div>
            <div class="sabor-picole">
                <img src="./images/picole-red.jpg" alt="Picolé">
            </div>
            <div class="sabor-picole">
                <img src="./images/picole-uva.jpg" alt="Picolé">
            </div>
            
        </div>

    </main>

</body>

</html>
